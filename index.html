<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Job Tracker</title>

  <!-- tailwindcss -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <!-- icon -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

  <!-- fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
  
  <style>
    * { font-family: "Geist", sans-serif; }
  </style>
</head>
<body class="bg-gray-100 p-6">

  <!-- Header -->
  <h1 class="text-4xl text-[#002C5C] font-bold mb-8">
    Job Application Tracker
  </h1>

  <!-- Summary Cards -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
    <div class="bg-white p-5 rounded-[8px] shadow text-center">
      <h2 class="text-sm text-[#323B49] font-semibold">Total</h2>
      <p id="totalCount" class="text-2xl text-[#002C5C] font-bold mt-2">8</p>
    </div>

    <div class="bg-white p-5 rounded-xl shadow text-center">
      <h2 class="text-sm text-[#323B49] font-semibold">Interview</h2>
      <p id="interviewCount" class="text-2xl font-bold mt-2 text-[#10B981]">0</p>
    </div>

    <div class="bg-white p-5 rounded-xl shadow text-center">
      <h2 class="text-sm text-[#323B49] font-semibold">Rejected</h2>
      <p id="rejectedCount" class="text-2xl font-bold mt-2 text-[#EF4444]">0</p>
    </div>
  </div>

  <!-- Available Jobs Header -->
  <div class="flex justify-between items-center mb-4">
    <h2 class="text-xl text-[#002C5C] font-semibold">
      Available Jobs
    </h2>

    <p class="text-[#64748B] text-base">
      <span id="availableCount">8</span> Jobs
    </p>
  </div>            

  <!-- Filter Buttons -->
  <div class="flex gap-3 mb-6">
    <button id="allTab" class="px-4 py-2 bg-white text-[#64748B] rounded-lg hover:bg-blue-500 hover:text-white transition">
      All
    </button>
    <button id="interviewTab" class="px-4 py-2 bg-white text-[#64748B] rounded-lg hover:bg-blue-500 hover:text-white transition">
      Interview
    </button>
    <button id="rejectedTab" class="px-4 py-2 bg-white text-[#64748B] rounded-lg hover:bg-blue-500 hover:text-white transition">
      Rejected
    </button>
  </div>

 
  
</body>
</html>
